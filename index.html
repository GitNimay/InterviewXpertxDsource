<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterviewXpert - AI Interview Platform ! </title>
  <meta name="description"
    content="InterviewXpert is an AI-powered platform designed to help you master your interview skills with real-time feedback and practice scenarios." />
  <link id="favicon" rel="icon" type="image/png" href="/logo-white.png">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Cloudinary Upload Widget -->
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: 'rgb(var(--primary-rgb) / <alpha-value>)',
              foreground: 'rgb(var(--primary-foreground-rgb) / <alpha-value>)',
              dark: 'rgb(63 63 70 / <alpha-value>)',
              light: 'rgb(var(--primary-rgb) / 0.12)'
            },
            accent: {
              DEFAULT: 'rgb(var(--accent-rgb) / <alpha-value>)',
              foreground: 'rgb(var(--accent-foreground-rgb) / <alpha-value>)',
              muted: 'rgb(var(--accent-rgb) / 0.72)'
            },
            background: 'rgb(var(--background-rgb) / <alpha-value>)',
            foreground: 'rgb(var(--foreground-rgb) / <alpha-value>)',
            card: {
              DEFAULT: 'rgb(var(--card-rgb) / <alpha-value>)',
              foreground: 'rgb(var(--card-foreground-rgb) / <alpha-value>)',
            },
            popover: {
              DEFAULT: 'rgb(var(--popover-rgb) / <alpha-value>)',
              foreground: 'rgb(var(--popover-foreground-rgb) / <alpha-value>)',
            },
            muted: {
              DEFAULT: 'rgb(var(--muted-rgb) / <alpha-value>)',
              foreground: 'rgb(var(--muted-foreground-rgb) / <alpha-value>)',
            },
            secondary: {
              DEFAULT: 'rgb(var(--secondary-rgb) / <alpha-value>)',
              foreground: 'rgb(var(--secondary-foreground-rgb) / <alpha-value>)',
            },
            border: 'rgb(var(--border-rgb) / <alpha-value>)',
            input: 'rgb(var(--input-rgb) / <alpha-value>)',
            ring: 'rgb(var(--ring-rgb) / <alpha-value>)',
            destructive: {
              DEFAULT: 'rgb(var(--destructive-rgb) / <alpha-value>)',
              foreground: 'rgb(var(--destructive-foreground-rgb, 250 250 250) / <alpha-value>)',
            },
            success: '#28a745',
            danger: 'rgb(var(--destructive-rgb) / <alpha-value>)',
            warning: '#ffc107',
            info: '#17a2b8',
            purple: '#6f42c1',
            teal: '#20c997',
            dark: '#343a40',
            light: '#f8f9fa'
          },
          fontFamily: {
            sans: ['var(--font-sans)'],
            mono: ['var(--font-mono)'],
            serif: ['var(--font-serif)'],
          },
          animation: {
            blob: "blob 7s infinite",
            marquee: "marquee var(--duration) linear infinite",
            "marquee-vertical": "marquee-vertical var(--duration) linear infinite",
          },
          keyframes: {
            blob: {
              "0%": { transform: "translate(0px, 0px) scale(1)" },
              "33%": { transform: "translate(30px, -50px) scale(1.1)" },
              "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
              "100%": { transform: "translate(0px, 0px) scale(1)" },
            },
            marquee: {
              from: { transform: "translateX(0)" },
              to: { transform: "translateX(calc(-100% - var(--gap)))" },
            },
            "marquee-vertical": {
              from: { transform: "translateY(0)" },
              to: { transform: "translateY(calc(-100% - var(--gap)))" },
            },
          },
          zIndex: {
            'navbar': '40',
            'overlay': '50',
            'modal': '110',
          },
        }
      }
    }
  </script>
  <script>
    // Immediately apply dark mode if preference exists to prevent FOUC (Flash of Unstyled Content)
    const storedTheme = localStorage.theme;
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (storedTheme === 'dark' || storedTheme === 'system' && prefersDark || (!storedTheme && prefersDark)) {
      document.documentElement.classList.add('dark')
    } else {
      document.documentElement.classList.remove('dark')
    }
  </script>
</head>

<body
  class="bg-background text-foreground font-sans antialiased min-h-screen flex flex-col transition-colors duration-300">
  <div id="root"></div>
  <div id="portal-root"></div>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
